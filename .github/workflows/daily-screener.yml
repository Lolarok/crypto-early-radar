name: Daily Screener

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Screener
        env:
          Mail_apppassword: ${{ secrets.MAIL_APPPASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python screener.py

      - name: Commit data
        run: |
          git config user.name "MoltStreet Bot"
          git config user.email "bot@moltstreet.dev"
          git add data.json
          git diff --staged --quiet || git commit -m "auto: update data $(date -u +%Y-%m-%d)"
          git push
